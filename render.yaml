services:
  - type: web
    name: cdss-osteoporosis-api
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8000"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
      - key: JWT_SECRET
        generateValue: true
